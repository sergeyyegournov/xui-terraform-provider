version: 2

project_name: terraform-provider-xui

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: terraform-provider-xui
    main: ./main.go
    binary: terraform-provider-xui_v{{ .Version }}
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: provider-archive
    ids:
      - terraform-provider-xui
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

signs:
  - cmd: gpg
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--detach-sign"
      # Binary detached signature (no --armor). Terraform Registry rejects armored .sig files.
      - "--output"
      - "${signature}"
      - "${artifact}"

release:
  prerelease: auto
  draft: false
